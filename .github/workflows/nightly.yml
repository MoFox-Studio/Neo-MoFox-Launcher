name: Nightly构建

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/nightly.yml'
  schedule:
    # 每天 UTC 00:00 (北京时间 08:00) 执行
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  # 检查最近 24 小时内是否有新提交
  check-commits:
    name: 检查提交
    runs-on: ubuntu-latest
    outputs:
      has_new_commits: ${{ steps.check.outputs.has_new_commits }}
      build_date: ${{ steps.check.outputs.build_date }}
      short_sha: ${{ steps.check.outputs.short_sha }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 检查最近 24 小时是否有新提交
        id: check
        run: |
          BUILD_DATE=$(date -u +'%Y%m%d')
          SHORT_SHA=$(git rev-parse --short=6 HEAD)
          VERSION="${BUILD_DATE}+${SHORT_SHA}"

          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "has_new_commits=true" >> $GITHUB_OUTPUT
            echo "手动触发，跳过提交检查。"
            exit 0
          fi

          COMMITS=$(git log --oneline --since="24 hours ago" | wc -l)
          if [ "$COMMITS" -gt 0 ]; then
            echo "has_new_commits=true" >> $GITHUB_OUTPUT
            echo "最近 24 小时内发现 $COMMITS 个新提交。"
          else
            echo "has_new_commits=false" >> $GITHUB_OUTPUT
            echo "最近 24 小时内无新提交，跳过构建。"
          fi

  # ============================================================
  # Windows 构建 (NSIS 安装包 + 便携版) - x64 / ia32 / arm64
  # ============================================================
  build-windows:
    name: 构建 Windows
    needs: check-commits
    if: needs.check-commits.outputs.has_new_commits == 'true'
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, ia32, arm64]
    env:
      BUILD_DATE: ${{ needs.check-commits.outputs.build_date }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: Neo-MoFox-Launcher/package-lock.json

      - name: 缓存 Electron
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-${{ matrix.arch }}-${{ hashFiles('Neo-MoFox-Launcher/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-${{ matrix.arch }}-

      - name: 安装依赖
        working-directory: Neo-MoFox-Launcher
        run: npm ci

      - name: 构建 Windows ${{ matrix.arch }}
        working-directory: Neo-MoFox-Launcher
        run: npx electron-builder --win --${{ matrix.arch }}

      - name: 重命名产物
        shell: pwsh
        working-directory: Neo-MoFox-Launcher
        run: |
          Get-ChildItem -Path "dist" -Filter "*.exe" | ForEach-Object {
            Write-Host "发现：$($_.Name) ($([math]::Round($_.Length / 1MB, 2)) MB)"
          }
          $setup = Get-ChildItem -Path "dist" -Filter "*-setup.exe" | Select-Object -First 1
          $portable = Get-ChildItem -Path "dist" -Filter "*-portable.exe" | Select-Object -First 1
          if ($setup) {
            $newName = "Neo-MoFox-Launcher-${{ env.BUILD_DATE }}-nightly-win-${{ matrix.arch }}-setup.exe"
            Copy-Item $setup.FullName "dist\$newName"
            Write-Host "安装包：$newName"
          }
          if ($portable) {
            $newName = "Neo-MoFox-Launcher-${{ env.BUILD_DATE }}-nightly-win-${{ matrix.arch }}-portable.exe"
            Copy-Item $portable.FullName "dist\$newName"
            Write-Host "便携版：$newName"
          }

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: Neo-MoFox-Launcher/dist/Neo-MoFox-Launcher-*-nightly-win-${{ matrix.arch }}-*.exe

  # ============================================================
  # Linux 构建 (deb 包) - x64 / arm64
  # 注意: Electron 不再为 Linux 提供 ia32 支持
  # ============================================================
  build-linux:
    name: 构建 Linux
    needs: check-commits
    if: needs.check-commits.outputs.has_new_commits == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    env:
      BUILD_DATE: ${{ needs.check-commits.outputs.build_date }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: Neo-MoFox-Launcher/package-lock.json

      - name: 缓存 Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ matrix.arch }}-${{ hashFiles('Neo-MoFox-Launcher/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-${{ matrix.arch }}-

      - name: 安装依赖
        working-directory: Neo-MoFox-Launcher
        run: npm ci

      - name: 安装打包依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg fakeroot

      - name: 配置 arm64 交叉编译工具链
        if: matrix.arch == 'arm64'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: 构建 Linux deb 和 AppImage (${{ matrix.arch }})
        working-directory: Neo-MoFox-Launcher
        run: npx electron-builder --linux deb appimage --${{ matrix.arch }}

      - name: 重命名产物
        working-directory: Neo-MoFox-Launcher
        run: |
          echo "构建输出："
          find dist -name "*.deb" -exec ls -lh {} \;
          find dist -name "*.AppImage" -exec ls -lh {} \;

          DEB_FILE=$(find dist -name "*.deb" | head -1)
          if [ -n "$DEB_FILE" ]; then
            NEW_NAME="dist/Neo-MoFox-Launcher-${{ env.BUILD_DATE }}-nightly-linux-${{ matrix.arch }}.deb"
            cp "$DEB_FILE" "$NEW_NAME"
            echo "deb 包已重命名为：$NEW_NAME"
          else
            echo "警告：未找到 .deb 文件！"
          fi

          APPIMAGE_FILE=$(find dist -name "*.AppImage" | head -1)
          if [ -n "$APPIMAGE_FILE" ]; then
            NEW_NAME="dist/Neo-MoFox-Launcher-${{ env.BUILD_DATE }}-nightly-linux-${{ matrix.arch }}.AppImage"
            cp "$APPIMAGE_FILE" "$NEW_NAME"
            echo "AppImage 已重命名为：$NEW_NAME"
          else
            echo "警告：未找到 .AppImage 文件！"
          fi

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: |
            Neo-MoFox-Launcher/dist/Neo-MoFox-Launcher-*-nightly-linux-${{ matrix.arch }}.deb
            Neo-MoFox-Launcher/dist/Neo-MoFox-Launcher-*-nightly-linux-${{ matrix.arch }}.AppImage

  # ============================================================
  # 发布到 GitHub Releases
  # ============================================================
  release:
    name: 发布到 GitHub Releases
    needs: [check-commits, build-windows, build-linux]
    if: |
      always() &&
      needs.check-commits.outputs.has_new_commits == 'true' &&
      (needs.build-windows.result == 'success' || needs.build-linux.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      BUILD_DATE: ${{ needs.check-commits.outputs.build_date }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 5

      - name: 下载全部产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 列出全部产物
        run: |
          echo "📦 所有构建产物:"
          find artifacts -type f | sort

      - name: 生成更新日志
        run: |
          cat > changelog.md << 'HEADER'
          ## 🌙 每夜构建版本 - ${{ env.BUILD_DATE }}

          ### 📝 最近提交
          HEADER
          git log --oneline --since="24 hours ago" --format="- %h %s" >> changelog.md
          cat >> changelog.md << 'FOOTER'

          ### 📦 构建信息
          - 🗓️ 构建日期: ${{ env.BUILD_DATE }}
          - 🔖 提交哈希: $(git rev-parse --short HEAD)
          - 🚀 自动构建: GitHub Actions

          ---

          > ⚠️ **注意**: 这是自动化每夜构建版本，可能存在不稳定因素，仅供测试使用。
          >
          > 📥 **下载说明：**
          > | 文件 | 说明 |
          > |------|------|
          > | `*-win-x64-setup.exe` | Windows x64 安装包 |
          > | `*-win-x64-portable.exe` | Windows x64 便携版 |
          > | `*-win-ia32-setup.exe` | Windows x86 安装包 |
          > | `*-win-ia32-portable.exe` | Windows x86 便携版 |
          > | `*-win-arm64-setup.exe` | Windows ARM64 安装包 |
          > | `*-win-arm64-portable.exe` | Windows ARM64 便携版 |
          > | `*-linux-x64.deb` | Linux x64 deb 包 |
          > | `*-linux-x64.AppImage` | Linux x64 AppImage |
          > | `*-linux-arm64.deb` | Linux ARM64 deb 包 |
          > | `*-linux-arm64.AppImage` | Linux ARM64 AppImage |
          >
          > **注意**: Linux 不再提供 ia32 (32位) 版本，因为 Electron 已停止支持 。
          FOOTER

      - name: 删除已存在的同日 nightly 发布（若有）
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "nightly-${{ env.BUILD_DATE }}" --yes --cleanup-tag 2>/dev/null || true

      - name: 清理过旧的 nightly 发布
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🧹 清理旧的每夜构建版本，保留最新的 6 个..."

          NIGHTLY_TAGS=$(gh release list --limit 100 --json tagName,isPrerelease,createdAt \
            --jq '.[] | select(.isPrerelease == true and (.tagName | startswith("nightly-"))) | .tagName' | sort -r)

          TOTAL_COUNT=$(echo "$NIGHTLY_TAGS" | wc -l)
          echo "📊 找到 $TOTAL_COUNT 个每夜构建版本"

          if [ "$TOTAL_COUNT" -le 6 ]; then
            echo "✅ 版本数量 <= 6，无需清理"
            exit 0
          fi

          TO_DELETE=$(echo "$NIGHTLY_TAGS" | tail -n +7)
          DELETE_COUNT=$(echo "$TO_DELETE" | wc -l)
          echo "🗑️  将删除 $DELETE_COUNT 个旧版本"

          echo "$TO_DELETE" | while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              echo "  删除: $tag"
              gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || echo "  ⚠️  删除失败: $tag"
            fi
          done

          echo "✅ 清理完成"

      - name: 收集待发布文件
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.exe" -o -name "*.deb" -o -name "*.AppImage" \) -exec cp {} release-files/ \;
          echo "📦 准备发布的文件:"
          ls -lh release-files/

      - name: 创建 nightly 发布
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "nightly-${{ env.BUILD_DATE }}" \
            --title "🌙 每夜构建 ${{ env.BUILD_DATE }}" \
            --notes-file changelog.md \
            --prerelease \
            release-files/*
          echo "✅ 发布完成: nightly-${{ env.BUILD_DATE }}"

  # ============================================================
  # 构建 PPA 源码包产物（供 Launchpad Build Recipe 使用或手动上传）
  # ============================================================
  # Launchpad PPA 上传只支持 FTP(21)/SSH(22)，两者在 GitHub Actions (Azure) 上均被封锁。
  # 解决方案：使用 Launchpad Build Recipe，让 Launchpad 主动拉取 GitHub 仓库构建，
  # 完全不需要从 CI 上传任何东西。
  # 设置步骤见 ppa/README.md → "Launchpad Build Recipe" 章节。
  #
  # 此 job 仅构建并归档签名源码包，供需要手动上传时使用（本地 TUN 模式梯子 + dput）。
  publish-ppa:
    name: 构建 PPA 源码包
    needs: check-commits
    if: needs.check-commits.outputs.has_new_commits == 'true'
    runs-on: ubuntu-latest
    env:
      DIST_TARGET: noble
      PKG_REV: '1'
      ARTIFACT_DIR: ppa/artifacts
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: Neo-MoFox-Launcher/package-lock.json

      - name: 安装打包依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts debhelper gnupg wget curl unzip

      - name: 导入 GPG 密钥
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.LAUNCHPAD_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          trust_level: 5

      - name: 导出 GPG 指纹供打包使用
        run: |
          echo "GPG_FINGERPRINT=${{ steps.import_gpg.outputs.fingerprint }}" >> $GITHUB_ENV

      - name: 构建已签名源码包
        env:
          GPG_FINGERPRINT: ${{ env.GPG_FINGERPRINT }}
          DEBFULLNAME: ikun114
          DEBEMAIL: 334495606@qq.com
        run: |
          chmod +x ppa/prepare-source.sh
          bash ppa/prepare-source.sh "${{ needs.check-commits.outputs.version }}"
          ls -lh ppa/artifacts

      - name: 上传 PPA 产物
        uses: actions/upload-artifact@v4
        with:
          name: ppa-source-${{ needs.check-commits.outputs.version }}
          path: ppa/artifacts/*
