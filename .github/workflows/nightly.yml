name: Nightly Build

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/nightly.yml'  # 推送此文件时触发（用于测试，确认能跑后可删除）
  schedule:
    # 每天 UTC 00:00 (北京时间 08:00) 执行
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  # 先检查最近 24 小时内是否有新提交
  check-commits:
    runs-on: ubuntu-latest
    outputs:
      has_new_commits: ${{ steps.check.outputs.has_new_commits }}
      build_date: ${{ steps.check.outputs.build_date }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new commits in last 24 hours
        id: check
        run: |
          BUILD_DATE=$(date +'%Y%m%d')
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT

          # 手动触发时跳过提交检查，直接构建
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "has_new_commits=true" >> $GITHUB_OUTPUT
            echo "Manual trigger, skipping commit check."
            exit 0
          fi

          COMMITS=$(git log --oneline --since="24 hours ago" | wc -l)
          if [ "$COMMITS" -gt 0 ]; then
            echo "has_new_commits=true" >> $GITHUB_OUTPUT
            echo "Found $COMMITS new commit(s) in last 24 hours, proceeding with build."
          else
            echo "has_new_commits=false" >> $GITHUB_OUTPUT
            echo "No new commits in last 24 hours, skipping build."
          fi

  # Windows 构建 (.exe)
  build-windows:
    needs: check-commits
    if: needs.check-commits.outputs.has_new_commits == 'true'
    runs-on: windows-latest
    env:
      BUILD_DATE: ${{ needs.check-commits.outputs.build_date }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: Neo-MoFox-Launcher/package-lock.json

      - name: Cache Electron and Electron Forge
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-forge
            ~\AppData\Local\Temp\electron-packager
          key: ${{ runner.os }}-electron-forge-${{ hashFiles('Neo-MoFox-Launcher/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-forge-
            ${{ runner.os }}-electron-

      - name: Install dependencies
        working-directory: Neo-MoFox-Launcher
        run: npm ci

      - name: Build Windows package
        working-directory: Neo-MoFox-Launcher
        run: npm run package

      - name: Create ZIP archive
        shell: pwsh
        working-directory: Neo-MoFox-Launcher
        run: |
          $packageDir = Get-ChildItem -Path "out" -Directory -Recurse | Where-Object { $_.Name -like "*-win32-*" } | Select-Object -First 1
          if ($packageDir) {
            $zipName = "Neo-MoFox-Launcher-${{ env.BUILD_DATE }}-nightly-win.zip"
            Compress-Archive -Path "$($packageDir.FullName)\*" -DestinationPath "out\$zipName" -Force
            Write-Host "Created $zipName"
          } else {
            Write-Error "Package directory not found"
            exit 1
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: Neo-MoFox-Launcher/out/Neo-MoFox-Launcher-*-nightly-win.zip

  # Linux 构建 (.deb)
  build-linux:
    needs: check-commits
    if: needs.check-commits.outputs.has_new_commits == 'true'
    runs-on: ubuntu-latest
    env:
      BUILD_DATE: ${{ needs.check-commits.outputs.build_date }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: Neo-MoFox-Launcher/package-lock.json

      - name: Install dependencies
        working-directory: Neo-MoFox-Launcher
        run: npm ci

      - name: Cache Electron and Electron Forge
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-forge
            /tmp/electron-packager
          key: ${{ runner.os }}-electron-forge-${{ hashFiles('Neo-MoFox-Launcher/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-forge-
            ${{ runner.os }}-electron-

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg fakeroot

      - name: Build Linux deb package
        working-directory: Neo-MoFox-Launcher
        run: npm run make:deb

      - name: Rename artifacts
        working-directory: Neo-MoFox-Launcher
        run: |
          DEB_FILE=$(find out/make/deb -name "*.deb" | head -1)
          NEW_NAME="Neo-MoFox-Launcher-${{ env.BUILD_DATE }}-nightly.deb"
          cp "$DEB_FILE" "out/$NEW_NAME"
          echo "Renamed to $NEW_NAME"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: Neo-MoFox-Launcher/out/Neo-MoFox-Launcher-*-nightly.deb

  # 发布到 GitHub Releases
  release:
    needs: [check-commits, build-windows, build-linux]
    if: needs.check-commits.outputs.has_new_commits == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      BUILD_DATE: ${{ needs.check-commits.outputs.build_date }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate changelog
        id: changelog
        run: |
          echo "## 🌙 每夜构建版本 - ${{ env.BUILD_DATE }}" > changelog.md
          echo "" >> changelog.md
          echo "### 📝 最近提交" >> changelog.md
          git log --oneline --since="24 hours ago" --format="- %h %s" >> changelog.md
          echo "" >> changelog.md
          echo "### 📦 构建信息" >> changelog.md
          echo "- 🗓️ 构建日期: ${{ env.BUILD_DATE }}" >> changelog.md
          echo "- 🔖 提交哈希: $(git rev-parse --short HEAD)" >> changelog.md
          echo "- 🚀 自动构建: GitHub Actions" >> changelog.md
          echo "" >> changelog.md
          echo "---" >> changelog.md
          echo "" >> changelog.md
          echo "> ⚠️ **注意**: 这是一个自动化每夜构建版本，可能存在不稳定因素，仅供测试使用。" >> changelog.md
          echo ">" >> changelog.md
          echo "> 📥 请根据您的操作系统下载对应的安装包：" >> changelog.md
          echo "> - Windows 用户请下载 `.zip` 文件，解压后运行" >> changelog.md
          echo "> - Linux 用户请下载 `.deb` 文件" >> changelog.md

      - name: Delete existing nightly release (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "nightly-${{ env.BUILD_DATE }}" --yes --cleanup-tag 2>/dev/null || true

      - name: Clean up old nightly releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🧹 清理旧的每夜构建版本，保留最新的 6 个版本..."
          gh release list --limit 100 | grep "nightly-" | awk '{print $1}' | tail -n +7 | while read tag; do
            echo "删除旧版本: $tag"
            gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
          done
          echo "✅ 清理完成"

      - name: Create nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "nightly-${{ env.BUILD_DATE }}" \
            --title "🌙 每夜构建 ${{ env.BUILD_DATE }}" \
            --notes-file changelog.md \
            --prerelease \
            artifacts/windows-build/Neo-MoFox-Launcher-${{ env.BUILD_DATE }}-nightly-win.zip \
            artifacts/linux-build/Neo-MoFox-Launcher-${{ env.BUILD_DATE }}-nightly.deb
          echo "✅ 发布完成: nightly-${{ env.BUILD_DATE }}"
