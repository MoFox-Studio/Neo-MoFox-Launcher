name: Nightly Build

on:
  schedule:
    # 每天 UTC 00:00 (北京时间 08:00) 执行
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  # 先检查最近 24 小时内是否有新提交
  check-commits:
    runs-on: ubuntu-latest
    outputs:
      has_new_commits: ${{ steps.check.outputs.has_new_commits }}
      build_date: ${{ steps.check.outputs.build_date }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new commits in last 24 hours
        id: check
        run: |
          BUILD_DATE=$(date +'%Y%m%d')
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT

          COMMITS=$(git log --oneline --since="24 hours ago" | wc -l)
          if [ "$COMMITS" -gt 0 ]; then
            echo "has_new_commits=true" >> $GITHUB_OUTPUT
            echo "Found $COMMITS new commit(s) in last 24 hours, proceeding with build."
          else
            echo "has_new_commits=false" >> $GITHUB_OUTPUT
            echo "No new commits in last 24 hours, skipping build."
          fi

  # Windows 构建 (.exe)
  build-windows:
    needs: check-commits
    if: needs.check-commits.outputs.has_new_commits == 'true'
    runs-on: windows-latest
    env:
      BUILD_DATE: ${{ needs.check-commits.outputs.build_date }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: Neo-MoFox-Launcher/package-lock.json

      - name: Install dependencies
        working-directory: Neo-MoFox-Launcher
        run: npm ci

      - name: Build Windows installer
        working-directory: Neo-MoFox-Launcher
        run: npm run make

      - name: Rename artifacts
        shell: pwsh
        working-directory: Neo-MoFox-Launcher
        run: |
          $squirrelDir = Get-ChildItem -Path "out/make/squirrel.windows" -Directory -Recurse | Select-Object -First 1
          $exe = Get-ChildItem -Path $squirrelDir.FullName -Filter "*.exe" | Select-Object -First 1
          $newName = "Neo-MoFox-Launcher-${{ env.BUILD_DATE }}-nightly.exe"
          Copy-Item $exe.FullName -Destination "out/$newName"
          Write-Host "Renamed to $newName"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: Neo-MoFox-Launcher/out/Neo-MoFox-Launcher-*-nightly.exe

  # Linux 构建 (.deb)
  build-linux:
    needs: check-commits
    if: needs.check-commits.outputs.has_new_commits == 'true'
    runs-on: ubuntu-latest
    env:
      BUILD_DATE: ${{ needs.check-commits.outputs.build_date }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: Neo-MoFox-Launcher/package-lock.json

      - name: Install dependencies
        working-directory: Neo-MoFox-Launcher
        run: npm ci

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg fakeroot

      - name: Build Linux deb package
        working-directory: Neo-MoFox-Launcher
        run: npm run make:deb

      - name: Rename artifacts
        working-directory: Neo-MoFox-Launcher
        run: |
          DEB_FILE=$(find out/make/deb -name "*.deb" | head -1)
          NEW_NAME="Neo-MoFox-Launcher-${{ env.BUILD_DATE }}-nightly.deb"
          cp "$DEB_FILE" "out/$NEW_NAME"
          echo "Renamed to $NEW_NAME"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: Neo-MoFox-Launcher/out/Neo-MoFox-Launcher-*-nightly.deb

  # 发布到 GitHub Releases
  release:
    needs: [check-commits, build-windows, build-linux]
    if: needs.check-commits.outputs.has_new_commits == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      BUILD_DATE: ${{ needs.check-commits.outputs.build_date }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate changelog
        id: changelog
        run: |
          echo "## Nightly Build - ${{ env.BUILD_DATE }}" > changelog.md
          echo "" >> changelog.md
          echo "### Recent Commits" >> changelog.md
          git log --oneline --since="24 hours ago" --format="- %h %s" >> changelog.md
          echo "" >> changelog.md
          echo "---" >> changelog.md
          echo "> This is an automated nightly build. It may be unstable." >> changelog.md

      - name: Delete existing nightly release (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "nightly-${{ env.BUILD_DATE }}" --yes --cleanup-tag 2>/dev/null || true

      - name: Create nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "nightly-${{ env.BUILD_DATE }}" \
            --title "Nightly Build ${{ env.BUILD_DATE }}" \
            --notes-file changelog.md \
            --prerelease \
            artifacts/windows-build/Neo-MoFox-Launcher-${{ env.BUILD_DATE }}-nightly.exe \
            artifacts/linux-build/Neo-MoFox-Launcher-${{ env.BUILD_DATE }}-nightly.deb
