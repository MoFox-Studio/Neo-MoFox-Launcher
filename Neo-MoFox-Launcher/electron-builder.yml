appId: com.mofox-studio.neo-mofox-launcher
productName: Neo-MoFox Launcher

directories:
  buildResources: assets/images/icon
  output: dist

files:
  - "**/*"
  - "!**/{.vscode,.github}"
  - "!**/*.{md,log}"
  - "!**/logs/**"
  - "!**/{.git,.idea}/**"
  - "!dist/**"
  - "!build-resources/**"
  # 明确包含 assets 目录（包括 material-symbols）
  - "assets/material-symbols/**"
  # 明确包含 OOBE SVG 插图文件
  - "assets/images/oobe/**"

# CLI 入口需要作为真实文件存在，以便 node 直接执行
# 同时解包 CLI 的 npm 依赖（@iarna/toml），确保纯 node 运行时可用
asarUnpack:
  - "src/cli/**"
  - "src/services/**"
  - "node_modules/@iarna/toml/**"

win:
  executableName: neo-mofox-launcher
  icon: assets/images/icon/icon.ico
  artifactName: ${productName}-${version}-${arch}-setup.${ext}
  target:
    - target: nsis
    - target: portable

nsis:
  artifactName: ${productName}-${version}-${arch}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  allowToChangeInstallationDirectory: true
  oneClick: false
  perMachine: true
  differentialPackage: false

portable:
  artifactName: ${productName}-${version}-${arch}-portable.${ext}

linux:
  executableName: neo-mofox-launcher
  icon: assets/images/icon/icon.png
  artifactName: ${productName}-${version}-${arch}.${ext}
  target:
    - target: AppImage
    - target: deb
    - target: rpm
  maintainer: MoFox Studio
  category: Utility
  desktop:
    entry:
      Name: Neo-MoFox Launcher
      StartupWMClass: neo-mofox-launcher

deb:
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libuuid1
    - libsecret-1-0

rpm:
  # Fedora / RHEL / openSUSE 等基于 RPM 的发行版的依赖
  depends:
    - gtk3
    - libnotify
    - nss
    - libXScrnSaver
    - libXtst
    - xdg-utils
    - at-spi2-atk
    - libuuid
    - libsecret
