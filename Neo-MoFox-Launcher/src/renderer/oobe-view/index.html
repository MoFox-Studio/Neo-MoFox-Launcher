<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neo-MoFox Launcher - 首次运行向导</title>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- Material Symbols -->
  <link rel="stylesheet" href="../../../assets/material-symbols/index.css" />
  
  <!-- Theme Sync Initialization (must load before any rendering) -->
  <script src="../theme-init.js"></script>
  
  <!-- Styles -->
  <link rel="stylesheet" href="../main-view/main.css">
  <link rel="stylesheet" href="oobe.css">
  
  <!-- Scripts -->
  <script src="../window-controls.js" defer></script>
</head>
<body>
  <!-- Title Bar -->
  <header class="title-bar">
    <div class="title-drag-region">
      <span class="app-title">Neo-MoFox Launcher - 首次运行向导</span>
    </div>
    <div class="window-controls">
      <button id="min-btn" class="window-btn minimize" title="最小化">
        <span class="material-symbols-rounded">remove</span>
      </button>
      <button id="max-btn" class="window-btn maximize" title="最大化">
        <span class="material-symbols-rounded">crop_square</span>
      </button>
      <button id="close-btn" class="window-btn close" title="关闭">
        <span class="material-symbols-rounded">close</span>
      </button>
    </div>
  </header>

  <div class="oobe-container">
    <!-- Left Panel: Illustration & Progress -->
    <aside class="oobe-left">
      <div class="oobe-branding">
        <h1 class="oobe-logo"> Neo-MoFox Launcher</h1>
        <p class="oobe-tagline">强大的 Neo-MoFox 机器人管理工具</p>
      </div>
      
      <div class="oobe-illustration">
        <img id="oobe-svg" src="../../../assets/images/oobe/undraw_setup-wizard_wzp9.svg" alt="OOBE Illustration">
      </div>
      
      <div class="oobe-progress-indicator">
        <div class="progress-bar-container">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <span class="progress-text" id="progress-text">步骤 1 / 6</span>
      </div>
    </aside>

    <!-- Right Panel: Step Content -->
    <main class="oobe-right">
      <div class="step-container" id="step-container">
        <!-- Step content will be dynamically rendered here -->
      </div>

      <footer class="oobe-actions">
        <button id="btn-prev" class="oobe-btn secondary" style="display: none;">
          <span class="material-symbols-rounded">arrow_back</span>
          <span>上一步</span>
        </button>
        
        <div class="action-spacer"></div>
        
        <button id="btn-skip" class="oobe-btn text" style="display: none;">
          跳过
        </button>
        
        <button id="btn-next" class="oobe-btn primary">
          <span>下一步</span>
          <span class="material-symbols-rounded">arrow_forward</span>
        </button>
      </footer>
    </main>
  </div>

  <!-- Scripts -->
  <script type="module" src="oobe.js"></script>
</body>
</html>
