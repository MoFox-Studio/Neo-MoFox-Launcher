<!-- ═══ Custom Titlebar Component ═══ -->
<header class="titlebar" id="titlebar">
  <div class="titlebar-drag">
    <div class="titlebar-brand">
      <div class="brand-icon">
        <span class="material-symbols-rounded">pets</span>
      </div>
      <span class="brand-text">Neo-MoFox</span>
      <span class="brand-badge">Launcher</span>
    </div>
  </div>
  <div class="titlebar-controls">
    <button class="tb-btn" id="btn-minimize" title="最小化">
      <span class="material-symbols-rounded">remove</span>
    </button>
    <button class="tb-btn" id="btn-maximize" title="最大化">
      <span class="material-symbols-rounded">crop_square</span>
    </button>
    <button class="tb-btn tb-btn-close" id="btn-close" title="关闭">
      <span class="material-symbols-rounded">close</span>
    </button>
  </div>
</header>
